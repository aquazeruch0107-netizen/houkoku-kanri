    <script>
    var FIREBASE_CONFIG={apiKey:"AIzaSyB2jrtwdRPW6tnn4HmvbH5w_dQZE_PNcac",authDomain:"houkoku-kanri.firebaseapp.com",projectId:"houkoku-kanri",storageBucket:"houkoku-kanri.firebasestorage.app",messagingSenderId:"596818230379",appId:"1:596818230379:web:f56d71f4dc2c72f0ff452e"};
    var auth=null,db=null,isFirebaseReady=false;
    try{firebase.initializeApp(FIREBASE_CONFIG);auth=firebase.auth();db=firebase.firestore();isFirebaseReady=true;}catch(e){console.warn('Firebase init failed:',e);}

    var tasks=[],myChecks={},teamMembers={},allUserChecks={},groups=[];
    var currentGroupId='',currentFilter='all',currentScreen='home';
    var selectedDayDate=null,calendar,currentAuthTab='login';
    var currentUser=null,currentUserName='';
    var firestoreUnsubscribe=null,checksUnsubscribe=null,membersUnsubscribe=null,groupsUnsubscribe=null;
    var isSyncingFromFirestore=false;
    var reminderCheckInterval=null;
    var lastKnownChecks={};
    var initialLoadDone=false; // Firestore初回読み込み完了フラグ
    window._presetTime=null;

    function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
    function fmtJP(ds){if(!ds)return '';return new Date(ds).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});}
    function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function isMyCompleted(taskId){return !!myChecks[taskId];}

    var holidaysCache={};
    function getBaseHolidays(year){
        var h={};h[year+'-01-01']='元日';
        var d1=new Date(year,0,1);while(d1.getDay()!==1)d1.setDate(d1.getDate()+1);d1.setDate(d1.getDate()+7);h[fmt(d1)]='成人の日';
        h[year+'-02-11']='建国記念の日';h[year+'-02-23']='天皇誕生日';
        var v=Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4));h[year+'-03-'+String(v).padStart(2,'0')]='春分の日';
        h[year+'-04-29']='昭和の日';h[year+'-05-03']='憲法記念日';h[year+'-05-04']='みどりの日';h[year+'-05-05']='こどもの日';
        var d2=new Date(year,6,1);while(d2.getDay()!==1)d2.setDate(d2.getDate()+1);d2.setDate(d2.getDate()+14);h[fmt(d2)]='海の日';
        h[year+'-08-11']='山の日';
        var d3=new Date(year,8,1);while(d3.getDay()!==1)d3.setDate(d3.getDate()+1);d3.setDate(d3.getDate()+14);h[fmt(d3)]='敬老の日';
        var a=Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4));h[year+'-09-'+String(a).padStart(2,'0')]='秋分の日';
        var d4=new Date(year,9,1);while(d4.getDay()!==1)d4.setDate(d4.getDate()+1);d4.setDate(d4.getDate()+7);h[fmt(d4)]='スポーツの日';
        h[year+'-11-03']='文化の日';h[year+'-11-23']='勤労感謝の日';return h;
    }
    function getAllHolidays(){
        var y=new Date().getFullYear();var i,ds,d,n,ns,yr,s,e,p,ps,day;
        for(i=y-2;i<=y+3;i++){if(!holidaysCache[i]){var base=getBaseHolidays(i);for(ds in base){if(base.hasOwnProperty(ds))holidaysCache[ds]=base[ds];}holidaysCache[i]=true;}}
        for(i=y-2;i<=y+3;i++){var bh=getBaseHolidays(i);for(ds in bh){if(!bh.hasOwnProperty(ds))continue;d=new Date(ds);if(d.getDay()===0){n=new Date(d);n.setDate(n.getDate()+1);ns=fmt(n);if(!holidaysCache[ns])holidaysCache[ns]='振替休日';}}}
        for(yr=y-1;yr<=y+2;yr++){s=new Date(yr,0,1);e=new Date(yr,11,31);for(d=new Date(s);d<=e;d.setDate(d.getDate()+1)){ds=fmt(d);if(holidaysCache[ds])continue;day=d.getDay();if(day===0||day===6)continue;p=new Date(d);p.setDate(p.getDate()-1);n=new Date(d);n.setDate(n.getDate()+1);ps=fmt(p);ns=fmt(n);if(holidaysCache[ps]&&holidaysCache[ns])holidaysCache[ds]='国民の休日';}}
        return holidaysCache;
    }

    // =============================================
    // ✅ LocalStorage（安全な読み書き）
    // =============================================
    function saveTasksLocal(){
        if(currentGroupId)localStorage.setItem('reports_'+currentGroupId,JSON.stringify(tasks));
    }
    function loadTasksLocal(){
        if(!currentGroupId){tasks=[];return;}
        var s=localStorage.getItem('reports_'+currentGroupId);
        if(s){try{tasks=JSON.parse(s);}catch(e){tasks=[];}}
        else{tasks=[];}
    }
    function saveChecksLocal(){if(currentUser)localStorage.setItem('checks_'+currentUser.uid,JSON.stringify(myChecks));}
    function loadChecksLocal(){if(currentUser){var s=localStorage.getItem('checks_'+currentUser.uid);if(s){try{myChecks=JSON.parse(s);}catch(e){myChecks={};}}else{myChecks={};}}}

    // =============================================
    // Firestore: グループ
    // =============================================
    function startGroupsListener(){
        if(!db)return;if(groupsUnsubscribe)groupsUnsubscribe();
        groupsUnsubscribe=db.collection('groups').orderBy('createdAt').onSnapshot(function(snapshot){
            groups=[];snapshot.forEach(function(doc){groups.push(Object.assign({id:doc.id},doc.data()));});
            if(!currentGroupId&&groups.length>0){
                currentGroupId=groups[0].id;
                loadTasksLocal(); // グループ決定後にローカル読み込み
                renderAll();
            }
            renderGroupUI();
        },function(err){console.error('Groups listener error:',err);});
    }
    function stopGroupsListener(){if(groupsUnsubscribe){groupsUnsubscribe();groupsUnsubscribe=null;}}
    function createGroup(name){
        if(!currentUser||!db)return Promise.resolve();
        return db.collection('groups').add({name:name,createdBy:currentUser.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }

    // =============================================
    // ✅ Firestore: タスク（初回読み込み保護付き）
    // =============================================
    function saveToFirestore(){
        if(!currentUser||!db||!currentGroupId)return Promise.resolve();
        return db.collection('reports').doc(currentGroupId).collection('items').doc('data').set({tasks:tasks,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(e){console.error('Firestore save error:',e);});
    }
    function startFirestoreListener(){
        if(!currentUser||!db||!currentGroupId)return;
        if(firestoreUnsubscribe)firestoreUnsubscribe();
        initialLoadDone=false;
        firestoreUnsubscribe=db.collection('reports').doc(currentGroupId).collection('items').doc('data').onSnapshot(function(doc){
            if(doc.exists&&doc.data()&&Array.isArray(doc.data().tasks)){
                isSyncingFromFirestore=true;
                tasks=doc.data().tasks;
                saveTasksLocal();
                renderAll();
                isSyncingFromFirestore=false;
            }else if(!initialLoadDone){
                // Firestoreにデータがない初回 → ローカルデータを維持してマイグレーション
                // tasks は loadTasksLocal() で既に設定済み
                renderAll();
            }
            initialLoadDone=true;
        },function(err){
            console.error('Firestore listener error:',err);
            initialLoadDone=true;
        });
    }
    function stopFirestoreListener(){if(firestoreUnsubscribe){firestoreUnsubscribe();firestoreUnsubscribe=null;}}

    // =============================================
    // Firestore: 個人チェック
    // =============================================
    function saveCheckToFirestore(taskId,checked){
        if(!currentUser||!db)return Promise.resolve();
        var update={};
        if(checked){update['checks.'+taskId]=new Date().toISOString();}
        else{update['checks.'+taskId]=firebase.firestore.FieldValue.delete();}
        return db.collection('users').doc(currentUser.uid).set(update,{merge:true}).catch(function(e){console.error('Check save error:',e);});
    }
    function startChecksListener(){
        if(!currentUser||!db)return;if(checksUnsubscribe)checksUnsubscribe();
        checksUnsubscribe=db.collection('users').doc(currentUser.uid).onSnapshot(function(doc){
            if(doc.exists&&doc.data()&&doc.data().checks){myChecks=doc.data().checks;saveChecksLocal();renderAll();}
        },function(err){console.error('Checks listener error:',err);});
    }
    function stopChecksListener(){if(checksUnsubscribe){checksUnsubscribe();checksUnsubscribe=null;}}

    // =============================================
    // Firestore: チームメンバー＋チェック通知
    // =============================================
    function startMembersListener(){
        if(!db)return;if(membersUnsubscribe)membersUnsubscribe();
        membersUnsubscribe=db.collection('users').onSnapshot(function(snapshot){
            teamMembers={};var newAllChecks={};
            snapshot.forEach(function(doc){
                var data=doc.data();
                teamMembers[doc.id]=data.displayName||data.email||'不明';
                if(data.checks)newAllChecks[doc.id]=data.checks;
            });
            if(currentUser&&Notification.permission==='granted'){
                Object.keys(newAllChecks).forEach(function(uid){
                    if(uid===currentUser.uid)return;
                    var oldChecks=(lastKnownChecks[uid]||{});
                    var newChecks=newAllChecks[uid]||{};
                    Object.keys(newChecks).forEach(function(tid){
                        if(!oldChecks[tid]&&newChecks[tid]){
                            var task=tasks.find(function(t){return String(t.id)===String(tid);});
                            var name=teamMembers[uid]||'不明';
                            var title=task?task.title:'報告項目';
                            new Notification('\u2705 '+name+'さんが報告しました',{body:title,icon:'/icon-512.png',tag:'check-'+uid+'-'+tid});
                            showCheckBanner(name,title);
                        }
                    });
                });
            }
            lastKnownChecks=newAllChecks;
            allUserChecks=newAllChecks;
            renderAll();
        },function(err){console.error('Members listener error:',err);});
    }
    function stopMembersListener(){if(membersUnsubscribe){membersUnsubscribe();membersUnsubscribe=null;}}

    // =============================================
    // ✅ マイグレーション（全グループ対応）
    // =============================================
    function migrateAllLocalToFirestore(){
        if(!currentUser||!db)return Promise.resolve();
        var promises=[];
        // 現在選択中のグループ
        if(currentGroupId){
            var l=localStorage.getItem('reports_'+currentGroupId);
            if(l){try{var p=JSON.parse(l);if(p.length>0){
                promises.push(db.collection('reports').doc(currentGroupId).collection('items').doc('data').get().then(function(doc){
                    if(!doc.exists){tasks=p;return saveToFirestore();}
                }));
            }}catch(e){}}
        }
        // 他のグループもスキャン
        for(var i=0;i<localStorage.length;i++){
            var key=localStorage.key(i);
            if(key&&key.indexOf('reports_')===0&&key!=='reports_'+currentGroupId){
                var gid=key.replace('reports_','');
                var raw=localStorage.getItem(key);
                if(raw){try{var arr=JSON.parse(raw);if(arr.length>0){
                    (function(g,data){
                        promises.push(db.collection('reports').doc(g).collection('items').doc('data').get().then(function(doc){
                            if(!doc.exists){return db.collection('reports').doc(g).collection('items').doc('data').set({tasks:data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});}
                        }));
                    })(gid,arr);
                }}catch(e){}}
            }
        }
        return Promise.all(promises).catch(function(e){console.error('Migration error:',e);});
    }

    function persistTasks(){if(isSyncingFromFirestore)return;if(currentUser)saveToFirestore();else saveTasksLocal();}

    // CRUD
    function addTask(t){t.id=Date.now();t.createdAt=new Date().toISOString();t.createdBy=currentUserName||'不明';tasks.push(t);persistTasks();renderAll();}
    function updateTask(id,u){var i=tasks.findIndex(function(t){return t.id===id;});if(i!==-1){tasks[i]=Object.assign({},tasks[i],u);persistTasks();renderAll();}}
    function deleteTask(id){if(confirm('削除しますか？')){tasks=tasks.filter(function(t){return t.id!==id;});persistTasks();renderAll();if(selectedDayDate&&document.getElementById('dayTasksModal').classList.contains('active'))renderDayTasks(selectedDayDate);}}
    function toggleTask(id){
        var nowChecked=!isMyCompleted(id);
        if(nowChecked){myChecks[id]=new Date().toISOString();}else{delete myChecks[id];}
        saveChecksLocal();
        if(currentUser)saveCheckToFirestore(id,nowChecked);
        renderAll();
        if(selectedDayDate&&document.getElementById('dayTasksModal').classList.contains('active'))renderDayTasks(selectedDayDate);
    }

    // リマインダー
    function getReminderTime(task){
        if(!task.reminder||!task.dueDate)return null;
        switch(task.reminder){
            case 'same_0900':return new Date(task.dueDate+'T09:00:00');
            case 'before_1h':if(!task.dueTime)return new Date(task.dueDate+'T09:00:00');var dt1=new Date(task.dueDate+'T'+task.dueTime+':00');dt1.setHours(dt1.getHours()-1);return dt1;
            case 'before_30m':if(!task.dueTime)return new Date(task.dueDate+'T09:00:00');var dt2=new Date(task.dueDate+'T'+task.dueTime+':00');dt2.setMinutes(dt2.getMinutes()-30);return dt2;
            case 'prev_2100':var prev=new Date(task.dueDate);prev.setDate(prev.getDate()-1);return new Date(fmt(prev)+'T21:00:00');
            default:return null;
        }
    }
    function getReminderLabel(r){return{'same_0900':'当日 9:00','before_1h':'1時間前','before_30m':'30分前','prev_2100':'前日 21:00'}[r]||'';}
    function checkReminders(){
        if(Notification.permission!=='granted')return;
        var now=new Date();
        var notified=JSON.parse(localStorage.getItem('notifiedReminders_report')||'{}');
        tasks.forEach(function(t){
            if(isMyCompleted(t.id))return;
            var rt=getReminderTime(t);if(!rt)return;
            var key='rem_'+t.id;
            if(notified[key])return;
            if(now>=rt&&(now-rt)<86400000){
                notified[key]=true;
                new Notification('\ud83d\udd14 リマインダー',{body:t.title+'\n'+(t.dueTime?'期限: '+t.dueTime:'期限: 今日'),icon:'/icon-512.png',tag:'reminder-'+t.id});
                showReminderBanner(t);
            }
        });
        localStorage.setItem('notifiedReminders_report',JSON.stringify(notified));
    }
    function startReminderChecker(){if(reminderCheckInterval)clearInterval(reminderCheckInterval);checkReminders();reminderCheckInterval=setInterval(checkReminders,60000);}

    function showCheckBanner(name,title){
        var b=document.getElementById('alertBanner'),tx=document.getElementById('alertBannerText');
        b.className='alert-banner visible level-check';
        tx.textContent='\u2705 '+name+'さんが「'+title+'」を報告しました';
        b.onclick=function(e){if(e.target.classList.contains('close-alert'))return;switchScreen('home');};
    }
    function showReminderBanner(t){
        var b=document.getElementById('alertBanner'),tx=document.getElementById('alertBannerText');
        b.className='alert-banner visible level-reminder';
        tx.textContent='\ud83d\udd14 リマインダー: '+t.title+(t.dueTime?' ('+t.dueTime+')':'');
        b.onclick=function(e){if(e.target.classList.contains('close-alert'))return;switchScreen('list');setFilter('pending');};
    }

    function renderAll(){renderTasks();renderHome();updateStats();updateCalendar();checkAlerts();}

    function checkAlerts(){
        var today=new Date();today.setHours(0,0,0,0);var tmr=new Date(today);tmr.setDate(tmr.getDate()+1);var in3=new Date(today);in3.setDate(in3.getDate()+3);
        var ts=fmt(today),tms=fmt(tmr),i3s=fmt(in3);var dis=localStorage.getItem('alertDismissedDate_report');
        var tT=tasks.filter(function(t){return !isMyCompleted(t.id)&&t.dueDate===ts;});
        var mT=tasks.filter(function(t){return !isMyCompleted(t.id)&&t.dueDate===tms;});
        var sT=tasks.filter(function(t){return !isMyCompleted(t.id)&&t.dueDate>tms&&t.dueDate<=i3s;});
        var b=document.getElementById('alertBanner'),tx=document.getElementById('alertBannerText');
        if(b.classList.contains('level-check')||b.classList.contains('level-reminder'))return;
        if(tT.length>0&&dis!==ts+'-today'){b.className='alert-banner visible level-today';tx.textContent='\u26a0\ufe0f 今日が期限: '+tT.map(function(t){return t.title;}).slice(0,3).join('、')+(tT.length>3?' 他'+(tT.length-3)+'件':'');b.onclick=function(e){if(e.target.classList.contains('close-alert'))return;switchScreen('list');setFilter('pending');};}
        else if(mT.length>0&&dis!==ts+'-tomorrow'){b.className='alert-banner visible level-tomorrow';tx.textContent='\ud83d\udd14 明日が期限: '+mT.map(function(t){return t.title;}).slice(0,3).join('、')+(mT.length>3?' 他'+(mT.length-3)+'件':'');b.onclick=function(e){if(e.target.classList.contains('close-alert'))return;switchScreen('list');setFilter('pending');};}
        else if(sT.length>0&&dis!==ts+'-soon'){b.className='alert-banner visible level-soon';tx.textContent='\ud83d\udccb 3日後までに期限: '+sT.map(function(t){return t.title;}).slice(0,3).join('、')+(sT.length>3?' 他'+(sT.length-3)+'件':'');b.onclick=function(e){if(e.target.classList.contains('close-alert'))return;switchScreen('list');setFilter('pending');};}
        else{b.className='alert-banner';}
    }
    function dismissAlert(){var ts=fmt(new Date()),b=document.getElementById('alertBanner');if(b.classList.contains('level-today'))localStorage.setItem('alertDismissedDate_report',ts+'-today');else if(b.classList.contains('level-tomorrow'))localStorage.setItem('alertDismissedDate_report',ts+'-tomorrow');else if(b.classList.contains('level-soon'))localStorage.setItem('alertDismissedDate_report',ts+'-soon');b.className='alert-banner';}
    function showSyncBannerIfNeeded(){if(!currentUser)return;if(!localStorage.getItem('syncBannerDismissed_report_'+currentUser.uid))document.getElementById('syncBanner').classList.add('visible');}
    function dismissSyncBanner(){document.getElementById('syncBanner').classList.remove('visible');if(currentUser)localStorage.setItem('syncBannerDismissed_report_'+currentUser.uid,'true');}

    // =============================================
    // ✅ グループ切替（データ保護付き）
    // =============================================
    function renderGroupUI(){
        var sl=document.getElementById('sidebarGroupList');
        sl.innerHTML=groups.map(function(g){return '<button class="group-chip'+(g.id===currentGroupId?' active':'')+'" onclick="switchGroup(\''+g.id+'\')">'+esc(g.name)+'</button>';}).join('');
        var mb=document.getElementById('mobileGroupBar');
        mb.innerHTML=groups.map(function(g){return '<button class="group-chip'+(g.id===currentGroupId?' active':'')+'" onclick="switchGroup(\''+g.id+'\')" style="flex-shrink:0">'+esc(g.name)+'</button>';}).join('');
    }
    function switchGroup(gid){
        if(gid===currentGroupId)return;
        // 現在のタスクを保存してから切替
        saveTasksLocal();
        currentGroupId=gid;
        stopFirestoreListener();
        // 新しいグループのローカルデータを読み込み
        loadTasksLocal();
        renderGroupUI();
        renderAll();
        // Firestoreリスナーを再開（初回読み込み保護あり）
        if(currentUser)startFirestoreListener();
    }
    function openGroupModal(){
        if(!currentUser){alert('ログインしてください');return;}
        document.getElementById('groupName').value='';
        openModal('groupModal');
    }
    document.getElementById('groupForm').addEventListener('submit',function(e){
        e.preventDefault();var name=document.getElementById('groupName').value.trim();
        if(!name)return;
        createGroup(name).then(function(){closeModal('groupModal');}).catch(function(err){alert('作成に失敗しました');});
    });

    // 認証UI
    function updateAuthUI(){
        var sb=document.getElementById('sidebarAuthBtn');var mb=document.getElementById('mobileAuthBtn');var ui=document.getElementById('sidebarUserInfo');
        if(currentUser){sb.textContent='\u2601\ufe0f 同期中';sb.classList.add('logged-in');mb.textContent='\u2601\ufe0f 同期中';mb.style.background='rgba(40,167,69,.3)';ui.textContent='\ud83d\udc64 '+(currentUserName||currentUser.email);}
        else{sb.textContent='\ud83d\udd12 ログイン';sb.classList.remove('logged-in');mb.textContent='\ud83d\udd12 ログイン';mb.style.background='rgba(255,255,255,.2)';ui.textContent='';}
    }
    function openAuthModal(){
        if(!isFirebaseReady){alert('Firebaseの設定が完了していません。');return;}
        document.getElementById('authError').classList.remove('visible');
        if(currentUser){document.getElementById('authTabs').style.display='none';document.getElementById('authForm').style.display='none';document.getElementById('authNote').style.display='none';document.getElementById('logoutSection').style.display='block';document.getElementById('loggedInEmail').textContent=(currentUserName||'')+'\n'+currentUser.email;document.getElementById('authModalTitle').textContent='アカウント';}
        else{document.getElementById('authTabs').style.display='flex';document.getElementById('authForm').style.display='block';document.getElementById('authNote').style.display='block';document.getElementById('logoutSection').style.display='none';switchAuthTab('login');}
        openModal('authModal');
    }
    function switchAuthTab(tab){
        currentAuthTab=tab;
        document.querySelectorAll('.auth-tab').forEach(function(t){t.classList.toggle('active',t.textContent===(tab==='login'?'ログイン':'新規登録'));});
        document.getElementById('authSubmitBtn').textContent=tab==='login'?'ログイン':'新規登録';
        document.getElementById('authModalTitle').textContent=tab==='login'?'ログイン':'新規登録';
        document.getElementById('authError').classList.remove('visible');
        document.getElementById('displayNameGroup').style.display=tab==='register'?'block':'none';
        if(tab==='register'){document.getElementById('authDisplayName').required=true;}else{document.getElementById('authDisplayName').required=false;}
    }
    document.getElementById('authForm').addEventListener('submit',function(e){
        e.preventDefault();if(!isFirebaseReady)return;
        var email=document.getElementById('authEmail').value.trim(),password=document.getElementById('authPassword').value;
        var displayName=document.getElementById('authDisplayName').value.trim();
        var errEl=document.getElementById('authError');errEl.classList.remove('visible');
        if(currentAuthTab==='register'&&!displayName){errEl.textContent='表示名を入力してください';errEl.classList.add('visible');return;}
        showLoading(currentAuthTab==='login'?'ログイン中...':'登録中...');
        var prom;
        if(currentAuthTab==='login'){prom=auth.signInWithEmailAndPassword(email,password);}
        else{prom=auth.createUserWithEmailAndPassword(email,password).then(function(cred){return cred.user.updateProfile({displayName:displayName}).then(function(){return db.collection('users').doc(cred.user.uid).set({displayName:displayName,email:email,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}).then(function(){return cred;});});}
        prom.then(function(cred){
            if(cred.user.displayName){currentUserName=cred.user.displayName;}
            else if(displayName){currentUserName=displayName;}
            else{return db.collection('users').doc(cred.user.uid).get().then(function(doc){if(doc.exists&&doc.data().displayName)currentUserName=doc.data().displayName;});}
        }).then(function(){closeModal('authModal');}).catch(function(err){
            var msgs={'auth/user-not-found':'アカウントが見つかりません','auth/wrong-password':'パスワードが正しくありません','auth/email-already-in-use':'このメールは既に登録されています','auth/invalid-email':'メールアドレスの形式が正しくありません','auth/weak-password':'パスワードは6文字以上にしてください','auth/invalid-credential':'メールまたはパスワードが正しくありません'};
            errEl.textContent=msgs[err.code]||'エラーが発生しました';errEl.classList.add('visible');
        }).finally(function(){hideLoading();});
    });
    function doLogout(){if(!auth)return;showLoading('ログアウト中...');stopFirestoreListener();stopChecksListener();stopMembersListener();stopGroupsListener();auth.signOut().then(function(){currentUserName='';myChecks={};allUserChecks={};teamMembers={};groups=[];currentGroupId='';tasks=[];closeModal('authModal');renderGroupUI();renderAll();}).catch(function(e){console.error(e);}).finally(function(){hideLoading();});}
    function showLoading(t){document.getElementById('loadingText').textContent=t||'処理中...';document.getElementById('loadingOverlay').classList.add('visible');}
    function hideLoading(){document.getElementById('loadingOverlay').classList.remove('visible');}
    function switchScreen(s){
        currentScreen=s;document.querySelectorAll('.screen').forEach(function(el){el.classList.remove('active');});document.getElementById(s+'Screen').classList.add('active');
        document.querySelectorAll('.nav-btn,.sidebar-btn[data-screen]').forEach(function(b){b.classList.toggle('active',b.dataset.screen===s);});
        document.getElementById('mobileTitle').textContent={home:'\ud83d\udcca 報告アプリ',list:'\ud83d\udcdd 報告一覧',calendar:'\ud83d\udcc5 カレンダー'}[s];
        if(s==='calendar'&&calendar)setTimeout(function(){calendar.updateSize();},50);
    }

    // ホーム
    function getDoneMemberNames(taskId){
        var names=[];
        Object.keys(allUserChecks).forEach(function(uid){if(allUserChecks[uid][taskId])names.push(teamMembers[uid]||'不明');});
        return names;
    }
    function renderHome(){
        var myPending=tasks.filter(function(t){return !isMyCompleted(t.id);});
        var myDone=tasks.filter(function(t){return isMyCompleted(t.id);});
        document.getElementById('pendingCount').textContent=myPending.length;
        document.getElementById('completedCount').textContent=myDone.length;
        document.getElementById('totalCount').textContent=tasks.length;
        var sorted=tasks.slice().sort(function(a,b){if(!a.dueDate)return 1;if(!b.dueDate)return -1;return new Date(a.dueDate+'T'+(a.dueTime||'23:59'))-new Date(b.dueDate+'T'+(b.dueTime||'23:59'));});
        var el=document.getElementById('teamStatusList');
        if(!sorted.length){el.innerHTML='<div class="empty-message">報告項目がありません</div>';}
        else{el.innerHTML=sorted.map(function(t){
            var dt=t.dueDate?fmtJP(t.dueDate)+(t.dueTime?' '+t.dueTime:''):'期限なし';
            var doneNames=getDoneMemberNames(t.id);
            var membersHtml=doneNames.length>0?doneNames.map(function(name){return '<span class="check-member-done">\u2705 '+esc(name)+'</span>';}).join(''):'<span class="check-none">\u2015</span>';
            return '<div class="report-status-item"><div class="report-status-title">'+esc(t.title)+'</div><div class="report-status-meta">\ud83d\udcc5 '+dt+' ・ 作成: '+esc(t.createdBy||'不明')+'</div><div class="check-members">'+membersHtml+'</div></div>';
        }).join('');}
        var today=new Date();today.setHours(0,0,0,0);var tmr=new Date(today);tmr.setDate(tmr.getDate()+1);
        var u=tasks.filter(function(t){if(isMyCompleted(t.id)||!t.dueDate)return false;var d=new Date(t.dueDate);d.setHours(0,0,0,0);return d<=tmr;}).sort(function(a,b){return new Date(a.dueDate)-new Date(b.dueDate);});
        document.getElementById('urgentTasksList').innerHTML=u.length?u.map(function(t){
            var ts=fmt(new Date());var tms=fmt(tmr);var c='today-task-item';if(t.dueDate<ts)c+=' overdue';else if(t.dueDate===tms)c+=' tomorrow';
            var p={low:'低',medium:'中',high:'高'}[t.priority];var dl=t.dueDate===ts?'今日':t.dueDate===tms?'明日':fmtJP(t.dueDate);
            return '<div class="'+c+'"><div><div class="today-task-title">'+esc(t.title)+'</div><div style="font-size:.75em;color:var(--text-sub);margin-top:2px;">'+dl+(t.dueTime?' ・ '+t.dueTime:'')+'</div></div><div class="today-task-info"><span class="priority-badge priority-'+t.priority+'">'+p+'</span></div></div>';
        }).join(''):'<div class="empty-message">\u2705 緊急の未報告はありません</div>';
    }

    // リスト
    function renderTasks(){
        var el=document.getElementById('taskList');var f=tasks;
        if(currentFilter==='pending')f=tasks.filter(function(t){return !isMyCompleted(t.id);});
        else if(currentFilter==='completed')f=tasks.filter(function(t){return isMyCompleted(t.id);});
        f.sort(function(a,b){if(!a.dueDate)return 1;if(!b.dueDate)return -1;return new Date(a.dueDate+'T'+(a.dueTime||'23:59'))-new Date(b.dueDate+'T'+(b.dueTime||'23:59'));});
        if(!f.length){el.innerHTML='<p class="empty-message">報告がありません</p>';return;}
        var today=new Date();today.setHours(0,0,0,0);var tmr=new Date(today);tmr.setDate(tmr.getDate()+1);
        el.innerHTML=f.map(function(t){
            var myDone=isMyCompleted(t.id);var c='task-item';if(myDone)c+=' my-completed';
            if(t.dueDate&&!myDone){var d=new Date(t.dueDate);d.setHours(0,0,0,0);if(d<today)c+=' overdue';else if(d.getTime()===tmr.getTime())c+=' tomorrow';}
            var p={low:'低',medium:'中',high:'高'}[t.priority];var dt=t.dueDate?fmtJP(t.dueDate)+(t.dueTime?' '+t.dueTime:''):'期限なし';
            var rmHtml=t.reminder?'<span class="reminder-badge">\ud83d\udd14 '+getReminderLabel(t.reminder)+'</span>':'';
            return '<div class="'+c+'"><input type="checkbox" class="task-checkbox" '+(myDone?'checked':'')+' onchange="toggleTask('+t.id+')"><div class="task-content"><div class="task-title">'+esc(t.title)+'</div><div class="task-meta"><span class="priority-badge priority-'+t.priority+'">'+p+'</span>'+rmHtml+'<span>\ud83d\udcc5 '+dt+'</span><span class="reporter-badge">作成: '+esc(t.createdBy||'不明')+'</span></div></div><div class="task-actions"><button class="btn btn-secondary" onclick="openEditModal('+t.id+')">編集</button><button class="btn btn-danger" onclick="deleteTask('+t.id+')">削除</button></div></div>';
        }).join('');
    }
    function updateStats(){
        document.getElementById('pendingCount').textContent=tasks.filter(function(t){return !isMyCompleted(t.id);}).length;
        document.getElementById('completedCount').textContent=tasks.filter(function(t){return isMyCompleted(t.id);}).length;
        document.getElementById('totalCount').textContent=tasks.length;
    }
    function setFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter===f);});renderTasks();}
    function openModal(id){document.getElementById(id).classList.add('active');}
    function closeModal(id){document.getElementById(id).classList.remove('active');}
    function openAddModal(d,t){document.getElementById('modalTitle').textContent='報告を追加';document.getElementById('taskId').value='';document.getElementById('taskTitle').value='';document.getElementById('taskDueDate').value=d||'';document.getElementById('taskDueTime').value=t||'';document.getElementById('taskPriority').value='medium';document.getElementById('taskReminder').value='';openModal('taskModal');setTimeout(function(){document.getElementById('taskTitle').focus();},100);}
    function openEditModal(id){var t=tasks.find(function(x){return x.id===id;});if(!t)return;document.getElementById('modalTitle').textContent='報告を編集';document.getElementById('taskId').value=t.id;document.getElementById('taskTitle').value=t.title;document.getElementById('taskDueDate').value=t.dueDate||'';document.getElementById('taskDueTime').value=t.dueTime||'';document.getElementById('taskPriority').value=t.priority;document.getElementById('taskReminder').value=t.reminder||'';openModal('taskModal');}
    function openDayTasksModal(ds){selectedDayDate=ds;document.getElementById('dayTasksTitle').innerHTML='\ud83d\udcc5 報告一覧 <span class="date-badge">'+fmtJP(ds)+'</span>';document.getElementById('dayTasksDateLabel').textContent='';renderDayTasks(ds);openModal('dayTasksModal');}
    function renderDayTasks(ds){
        var items=tasks.filter(function(t){return t.dueDate===ds;}).sort(function(a,b){var ac=isMyCompleted(a.id)?1:0;var bc=isMyCompleted(b.id)?1:0;if(ac!==bc)return ac-bc;return(a.dueTime||'99:99').localeCompare(b.dueTime||'99:99');});
        var el=document.getElementById('dayTasksList');
        if(!items.length){el.innerHTML='<div class="day-task-empty"><div class="empty-icon">\ud83d\udced</div><div>この日の報告はありません</div><div style="font-size:.8em;margin-top:4px;color:#adb5bd;">下のボタンから追加できます</div></div>';return;}
        var ts=fmt(new Date());
        el.innerHTML=items.map(function(t){
            var myDone=isMyCompleted(t.id);var c='day-task-item';if(myDone)c+=' my-completed';if(!myDone&&t.dueDate<ts)c+=' overdue';
            return '<div class="'+c+'" onclick="openEditModal('+t.id+')"><input type="checkbox" class="task-checkbox" '+(myDone?'checked':'')+' onclick="event.stopPropagation();toggleTask('+t.id+')"><div class="day-task-time">'+(t.dueTime||'終日')+'</div><div class="day-task-title">'+esc(t.title)+'</div><span class="priority-badge priority-'+t.priority+'">'+({low:'低',medium:'中',high:'高'}[t.priority])+'</span></div>';
        }).join('');
    }
    function addTaskForDay(){if(!selectedDayDate)return;var pt=window._presetTime;closeModal('dayTasksModal');openAddModal(selectedDayDate,pt||null);window._presetTime=null;}
    document.getElementById('taskForm').addEventListener('submit',function(e){
        e.preventDefault();var id=document.getElementById('taskId').value;
        var t={title:document.getElementById('taskTitle').value.trim(),dueDate:document.getElementById('taskDueDate').value,dueTime:document.getElementById('taskDueTime').value,priority:document.getElementById('taskPriority').value,reminder:document.getElementById('taskReminder').value};
        if(!t.title)return;if(id)updateTask(parseInt(id),t);else addTask(t);closeModal('taskModal');
    });

    // カレンダー
    function initCalendar(){
        getAllHolidays();
        calendar=new FullCalendar.Calendar(document.getElementById('calendar'),{
            initialView:'dayGridMonth',locale:'ja',headerToolbar:{left:'prev',center:'title',right:'next'},height:'100%',
            dayMaxEvents:true,moreLinkText:function(n){return '他'+n+'件';},
            dayCellClassNames:function(a){return holidaysCache[fmt(a.date)]?['fc-holiday']:[];},
            dayCellContent:function(a){var h=holidaysCache[fmt(a.date)];var html='<span class="fc-daygrid-day-number">'+a.date.getDate()+'</span>';if(h)html+='<div class="fc-holiday-name">'+h+'</div>';return{html:html};},
            events:function(i,cb){cb(tasks.filter(function(t){return t.dueDate;}).map(function(t){var myDone=isMyCompleted(t.id);return{title:t.title,start:t.dueTime?t.dueDate+'T'+t.dueTime+':00':t.dueDate,allDay:!t.dueTime,backgroundColor:myDone?'#28a745':t.priority==='high'?'#dc3545':t.priority==='medium'?'#ffc107':'#2e7d32',borderColor:myDone?'#28a745':t.priority==='high'?'#dc3545':t.priority==='medium'?'#ffc107':'#2e7d32',textColor:t.priority==='medium'&&!myDone?'#000':'#fff',extendedProps:{taskId:t.id}};}));},
            dateClick:function(i){window._presetTime=null;openDayTasksModal(i.dateStr);},
            eventClick:function(i){openDayTasksModal(fmt(new Date(i.event.start)));}
        });calendar.render();
    }
    function updateCalendar(){if(calendar)calendar.refetchEvents();}

    function registerServiceWorker(){if(!('serviceWorker' in navigator))return Promise.resolve(null);return navigator.serviceWorker.register('/sw.js').catch(function(e){return null;});}

    // =============================================
    // ✅ 初期化（データ消失防止）
    // =============================================
    document.addEventListener('DOMContentLoaded',function(){
        // まずローカルデータを表示（グループ決定前でも安全）
        renderAll();initCalendar();registerServiceWorker();startReminderChecker();
        if('Notification' in window&&Notification.permission==='default'){Notification.requestPermission();}
        if(isFirebaseReady&&auth){
            auth.onAuthStateChanged(function(user){
                currentUser=user;
                if(user){
                    if(user.displayName){currentUserName=user.displayName;}
                    else{db.collection('users').doc(user.uid).get().then(function(doc){if(doc.exists&&doc.data().displayName)currentUserName=doc.data().displayName;}).catch(function(){});}
                    loadChecksLocal();
                    lastKnownChecks={};
                    var settled=false;var tid=setTimeout(function(){if(!settled){settled=true;hideLoading();}},5000);
                    showLoading('同期中...');
                    startGroupsListener();
                    // グループ決定後にマイグレーション＋リスナー開始
                    var waitForGroup=setInterval(function(){
                        if(currentGroupId){
                            clearInterval(waitForGroup);
                            migrateAllLocalToFirestore().then(function(){
                                startFirestoreListener();startChecksListener();startMembersListener();showSyncBannerIfNeeded();
                            }).catch(function(e){console.error('Sync error:',e);}).then(function(){if(!settled){settled=true;clearTimeout(tid);hideLoading();}});
                        }
                    },100);
                    // 5秒でタイムアウト
                    setTimeout(function(){clearInterval(waitForGroup);},4500);
                }else{stopFirestoreListener();stopChecksListener();stopMembersListener();stopGroupsListener();document.getElementById('syncBanner').classList.remove('visible');currentUserName='';myChecks={};allUserChecks={};teamMembers={};groups=[];currentGroupId='';tasks=[];renderAll();renderGroupUI();}
                updateAuthUI();
            });
        }
    });
    document.querySelectorAll('.modal').forEach(function(m){m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('active');});});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')document.querySelectorAll('.modal.active').forEach(function(m){m.classList.remove('active');});});
    </script>
</body>
</html>
